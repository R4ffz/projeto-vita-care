# Configuração Nginx para o VitaCare IoT — frontend dockerizado.
# Serve a SPA React (Vite build) e atua como reverse proxy do backend Spring
# para que o navegador faça todas as chamadas no mesmo host (origem única,
# sem necessidade de configuração CORS adicional).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressão simples para os estáticos da SPA.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml font/woff2;
    gzip_min_length 1024;

    # Cache longo para hashed assets do Vite.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: deixa o React Router resolver a rota.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy: API REST do backend Spring.
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Reverse proxy: WebSocket/STOMP (handshake exige upgrade de protocolo).
    location /ws {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Health endpoint local (para healthcheck do nginx — opcional).
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
