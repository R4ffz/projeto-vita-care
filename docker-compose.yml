# Stack completa do VitaCare IoT.
# Sobe: PostgreSQL, Mosquitto, backend Spring Boot e frontend (Nginx).
# O simulador (Node.js) continua rodando fora do compose — execute
# `cd simulator && npm start` em um terminal separado.

services:

  postgres:
    image: postgres:16-alpine
    container_name: vitacare-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       vitacare
      POSTGRES_USER:     vitacare
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vitacare_dev}
    ports:
      - "5432:5432"
    volumes:
      - vitacare-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U vitacare -d vitacare"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks:
      - vitacare

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: vitacare-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks:
      - vitacare

  backend:
    build:
      context: ./backend
    image: vitacare-backend:dev
    container_name: vitacare-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE:        docker
      SPRING_DATASOURCE_URL:         jdbc:postgresql://postgres:5432/vitacare
      SPRING_DATASOURCE_USERNAME:    vitacare
      SPRING_DATASOURCE_PASSWORD:    ${POSTGRES_PASSWORD:-vitacare_dev}
      MQTT_BROKER_URL:               tcp://mosquitto:1883
      VITACARE_SECURITY_JWT_SECRET:  ${JWT_SECRET:-vitacare-iot-dev-secret-troque-em-producao-min-32-bytes-please}
    ports:
      - "8080:8080"
    networks:
      - vitacare

  frontend:
    build:
      context: ./frontend
    image: vitacare-frontend:dev
    container_name: vitacare-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    networks:
      - vitacare

volumes:
  vitacare-postgres-data:

networks:
  vitacare:
    driver: bridge
    name: vitacare
