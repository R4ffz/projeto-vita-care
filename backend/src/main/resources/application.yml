spring:
  application:
    name: vitacare-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/vitacare
    username: vitacare
    password: vitacare_dev
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

logging:
  level:
    com.vitacare: INFO
    org.springframework.web: INFO
